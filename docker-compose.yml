
version: '3.8'

services:
  fastapi-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: medical_api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - sqlite_data:/app/data
      - scan_uploads:/tmp/medical_scans
    environment:
      - SQLITE_DB_FILE=/app/data/medical_assistant.db
      - REDIS_HOST=redis-broker
      - REDIS_PORT=6379
      - QDRANT_HOST=qdrant-vector
      - QDRANT_PORT=6333
    env_file:
      - .env
    depends_on:
      redis-broker:
        condition: service_healthy
      qdrant-vector:
        condition: service_healthy

  arq-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: medical_worker
    command: arq app.worker.WorkerSettings
    volumes:
      - .:/app
      - sqlite_data:/app/data
      - scan_uploads:/tmp/medical_scans
    environment:
      - SQLITE_DB_FILE=/app/data/medical_assistant.db
      - REDIS_HOST=redis-broker
      - REDIS_PORT=6379
      - QDRANT_HOST=qdrant-vector
      - QDRANT_PORT=6333
    env_file:
      - .env
    depends_on:
      redis-broker:
        condition: service_healthy
      qdrant-vector:
        condition: service_healthy

  redis-broker:
    image: redis:7-alpine
    container_name: medical_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  qdrant-vector:
    image: qdrant/qdrant:latest
    container_name: medical_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  sqlite_data:
  redis_data:
  qdrant_data:
  scan_uploads: